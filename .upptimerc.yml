owner: vorlek
repo: vorlek-status

sites:
  - name: API health
    url: https://api.vorlek.com/health
    expectedStatusCodes: [200]
    tags: [incident]
    frequency: 5
  - name: Dashboard
    url: https://dashboard.vorlek.com/
    expectedStatusCodes: [200]
    tags: [incident]
    frequency: 5
  - name: Docs
    url: https://vorlek.dev/SKILL.md
    expectedStatusCodes: [200]
    tags: [incident]
    frequency: 5
  - name: MCP install
    url: https://registry.npmjs.org/@vorlek/email-mcp
    expectedStatusCodes: [200]
    tags: [incident]
    frequency: 60
    method: HEAD
  - name: TS SDK install
    url: https://registry.npmjs.org/@vorlek/sdk
    expectedStatusCodes: [200]
    tags: [incident]
    frequency: 60
    method: HEAD
  - name: Python SDK install
    url: https://pypi.org/pypi/vorlek/json
    type: globalping
    expectedStatusCodes: [200]
    tags: [incident]
    frequency: 60
    method: HEAD
  - name: ci-live last green
    url: https://api.vorlek.com/status/ci-live
    expectedStatusCodes: [200]
    tags: [incident]
    frequency: 15

status-website:
  cname: status.vorlek.com
  baseUrl: /
  name: Vorlek Status
  logoUrl: https://raw.githubusercontent.com/vorlek/vorlek-status/main/assets/logo.svg
  faviconSvg: https://raw.githubusercontent.com/vorlek/vorlek-status/main/assets/favicon.svg
  introTitle: "Vorlek public service status"
  introMessage: Live uptime and incident history for Vorlek API, dashboard, docs, SDK registry packages, and ci-live operational signal.
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/vorlek/vorlek-status
  css: |
    @media (prefers-color-scheme: light) {
      :root {
        --vorlek-bg: #fafafa;
        --vorlek-fg: #0a0a0a;
        --vorlek-muted: #525252;
        --vorlek-surface: #ffffff;
        --vorlek-border: #e5e5e5;
        --vorlek-code-bg: #f3f3f3;
        --vorlek-code-border: #e5e5e5;
        --vorlek-accent: #0066cc;
        --vorlek-accent-hover: #0052a3;
        --vorlek-success: #15803d;
        --vorlek-warning: #b45309;
        --vorlek-danger: #b91c1c;
        --vorlek-font-sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --vorlek-font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono", monospace;

        --body-background-color: var(--vorlek-bg);
        --body-text-color: var(--vorlek-fg);
        --card-background-color: var(--vorlek-surface);
        --nav-background-color: var(--vorlek-surface);
        --nav-border-bottom-color: var(--vorlek-border);
        --nav-current-border-bottom-color: var(--vorlek-accent);
        --card-border-color: var(--vorlek-border);
        --up-border-left-color: var(--vorlek-success);
        --degraded-border-left-color: var(--vorlek-warning);
        --down-border-left-color: var(--vorlek-danger);
        --submit-button-background-color: var(--vorlek-accent);
        --submit-button-border-color: var(--vorlek-accent-hover);
      }

      body {
        font-family: var(--vorlek-font-sans);
      }

      code,
      kbd,
      pre,
      samp {
        font-family: var(--vorlek-font-mono);
      }

      a {
        color: var(--vorlek-accent);
      }
    }

assignees:
  - tmatow4

i18n:
  activeIncidents: Active Incidents
