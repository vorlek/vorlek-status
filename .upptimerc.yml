owner: vorlek
repo: vorlek-status

sites:
  - name: API health
    url: https://api.vorlek.com/health
    expectedStatusCodes: [200]
    frequency: 5
  - name: Dashboard
    url: https://dashboard.vorlek.com/
    expectedStatusCodes: [200]
    frequency: 5
  - name: Docs
    url: https://vorlek.dev/skill.md
    expectedStatusCodes: [200]
    frequency: 5
  - name: MCP install
    url: https://registry.npmjs.org/@vorlek/email-mcp
    expectedStatusCodes: [200]
    frequency: 60
    method: HEAD
  - name: TS SDK install
    url: https://registry.npmjs.org/@vorlek/sdk
    expectedStatusCodes: [200]
    frequency: 60
    method: HEAD
  - name: Python SDK install
    url: https://pypi.org/pypi/vorlek/json
    expectedStatusCodes: [200]
    frequency: 60
    method: HEAD
  - name: ci-live last green
    url: https://api.vorlek.com/status/ci-live
    expectedStatusCodes: [200]
    frequency: 15

status-website:
  cname: status.vorlek.com
  baseUrl: /
  name: Vorlek Status
  introTitle: "Vorlek public service status"
  introMessage: Live uptime and incident history for Vorlek API, dashboard, docs, SDK registry packages, and ci-live operational signal.
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/vorlek/vorlek-status

assignees:
  - tmatow4

i18n:
  activeIncidents: Active Incidents
