# Fly.io config for the Gatus-backed Vorlek public status page.

app = "vorlek-status"
primary_region = "iad"

[build]

[env]
  GATUS_CONFIG_PATH = "/config/config.yaml"
  GATUS_LOG_LEVEL = "INFO"

[mounts]
  source = "gatus_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
