web:
  port: 8080

metrics: true
concurrency: 3

ui:
  title: "Vorlek Status"
  description: "Live health for Vorlek public services, SDK packages, MCP package, and operational signals."
  dashboard-heading: "Vorlek Status"
  dashboard-subheading: "Live health for Vorlek API, dashboard, docs, SDK packages, MCP package, and ci-live operational signal."
  header: "Vorlek Status"
  logo: "https://raw.githubusercontent.com/vorlek/vorlek-status/main/assets/logo.svg"
  link: "/"
  favicon:
    default: "https://raw.githubusercontent.com/vorlek/vorlek-status/main/assets/favicon.svg"
    size16x16: "https://raw.githubusercontent.com/vorlek/vorlek-status/main/assets/favicon.svg"
    size32x32: "https://raw.githubusercontent.com/vorlek/vorlek-status/main/assets/favicon.svg"
  dark-mode: false
  default-sort-by: group
  custom-css: |-
    html {
      scrollbar-gutter: stable !important;
    }

    header.border-b {
      background: #ffffff !important;
      backdrop-filter: none !important;
    }

    header > .container {
      box-sizing: border-box !important;
      max-width: 1280px !important;
      height: 4rem !important;
      padding: 0 1.5rem !important;
    }

    .container.max-w-7xl {
      box-sizing: border-box !important;
      max-width: 1280px !important;
      padding-left: 1.5rem !important;
      padding-right: 1.5rem !important;
    }

    header > .container > .flex {
      height: 4rem !important;
      align-items: center !important;
    }

    header a.flex.items-center.gap-3 {
      height: 4rem !important;
      gap: 0.75rem !important;
      color: #020817 !important;
      text-decoration: none !important;
    }

    header a.flex.items-center.gap-3 > div:first-child {
      width: 2.75rem !important;
      height: 2.75rem !important;
      flex: 0 0 auto !important;
    }

    header a.flex.items-center.gap-3 img {
      display: block !important;
      width: 2.75rem !important;
      height: 2.75rem !important;
      border: 1px solid #e2e8f0 !important;
      border-radius: 0.5rem !important;
      background: #ffffff !important;
      object-fit: contain !important;
    }

    header a.flex.items-center.gap-3 h1 {
      font-size: 1rem !important;
      font-weight: 700 !important;
      line-height: 1 !important;
      letter-spacing: -0.025em !important;
      color: #020817 !important;
    }

    header a.flex.items-center.gap-3 p {
      display: none !important;
    }

    header nav {
      gap: 0.25rem !important;
    }

    header nav a {
      display: inline-flex !important;
      height: 2.25rem !important;
      align-items: center !important;
      border: 1px solid transparent !important;
      border-radius: 0.375rem !important;
      padding: 0 0.75rem !important;
      color: #64748b !important;
      font-size: 0.875rem !important;
      font-weight: 500 !important;
      line-height: 1.25rem !important;
      text-decoration: none !important;
    }

    header nav a:hover {
      border-color: #e2e8f0 !important;
      background: #f1f5f9 !important;
      color: #020817 !important;
    }

    html.dark header.border-b {
      background: #020817 !important;
    }

    html.dark header a.flex.items-center.gap-3,
    html.dark header a.flex.items-center.gap-3 h1 {
      color: #f8fafc !important;
    }

    html.dark header a.flex.items-center.gap-3 img {
      border-color: #1e293b !important;
      background: #020817 !important;
    }

    html.dark header nav a {
      color: #94a3b8 !important;
    }

    html.dark header nav a:hover {
      border-color: #1e293b !important;
      background: #1e293b !important;
      color: #f8fafc !important;
    }
  buttons:
    - name: "Vorlek Dev"
      link: "https://vorlek.dev/"
    - name: "Dashboard"
      link: "https://dashboard.vorlek.com/"
    - name: "GitHub"
      link: "https://github.com/vorlek/vorlek-status"

storage:
  type: sqlite
  path: /data/gatus.db
  caching: true
  maximum-number-of-results: 200
  maximum-number-of-events: 100

endpoints:
  - name: API health
    group: Core
    url: "https://api.vorlek.com/health"
    interval: 5m
    conditions:
      - "[STATUS] == 200"

  - name: Dashboard
    group: Core
    url: "https://dashboard.vorlek.com/"
    interval: 5m
    conditions:
      - "[STATUS] == 200"

  - name: Docs
    group: Core
    url: "https://vorlek.dev/SKILL.md"
    interval: 5m
    conditions:
      - "[STATUS] == 200"

  - name: ci-live last green
    group: Operations
    url: "https://api.vorlek.com/status/ci-live"
    interval: 15m
    conditions:
      - "[STATUS] == 200"

  - name: MCP install
    group: Distribution
    url: "https://registry.npmjs.org/@vorlek/email-mcp"
    method: HEAD
    interval: 60m
    conditions:
      - "[STATUS] == 200"

  - name: TS SDK install
    group: Distribution
    url: "https://registry.npmjs.org/@vorlek/sdk"
    method: HEAD
    interval: 60m
    conditions:
      - "[STATUS] == 200"

  - name: Python SDK install
    group: Distribution
    url: "https://pypi.org/pypi/vorlek/json"
    method: HEAD
    interval: 60m
    conditions:
      - "[STATUS] == 200"
